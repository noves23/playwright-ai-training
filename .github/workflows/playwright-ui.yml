name: Playwright Manual Run

on:
  workflow_dispatch:
    inputs:
      test_tag:
        description: 'Select test tag to run'
        required: true
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'smoke'
          - 'regression'
          - 'sanity'
      environment:
        description: Test environment
        required: true
        type: choice
        options:
          - integration
          - abnahme

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}${{ github.event.inputs.environment }}/

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Install Allure CLI
      if: always()
      run: npm install -g allure-commandline

    - name: Run Playwright tests
      env:
        TAG: ${{ github.event.inputs.test_tag }}
        ENVIRONMENT: ${{ github.event.inputs.environment }}
      run: |
        if [ "$TAG" = "all" ]; then
          npx playwright test --project="$ENVIRONMENT"
        else
          npx playwright test --project="$ENVIRONMENT" --grep "@$TAG"
        fi

    # Optimization 1: Separate history paths per environment
    - name: Checkout GitHub Pages Branch
      if: always()
      uses: actions/checkout@v4
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages-dir

    - name: Copy Environment Allure History
      if: always()
      continue-on-error: true
      run: |
        mkdir -p allure-results/history
        cp -r gh-pages-dir/${{ github.event.inputs.environment }}/history/* allure-results/history/ || true

    - name: Generate Allure report
      if: always()
      run: |
          allure generate allure-results --clean -o allure-report-env

    # Optimization 2: Clean up history files (keep last 20 runs)
    - name: Manage and Clean History
      if: always()
      continue-on-error: true
      run: |
        mkdir -p gh-pages-dir/${{ github.event.inputs.environment }}
        cp -r allure-report-env/* gh-pages-dir/${{ github.event.inputs.environment }}/
        
        # Clean history files inside the trend data to keep repository small
        cd gh-pages-dir/${{ github.event.inputs.environment }}/history
        ls -tp | grep -v '/$' | tail -n +21 | xargs -I {} rm -- {} || true

    - name: Upload Pages artifact
      if: always()
      uses: actions/upload-pages-artifact@v3
      with:
          path: gh-pages-dir

    # Deploy the comprehensive multi-environment folder structure
    - name: Deploy to GitHub Pages
      id: deployment
      if: always()
      uses: actions/deploy-pages@v4

    # Optimization 3: Add Summary Link to GitHub Job Output
    - name: Publish Summary Link
      if: always()
      run: |
        echo "### 📊 Test Run Results" >> $GITHUB_STEP_SUMMARY
        echo "- **Environment:** \`${{ github.event.inputs.environment }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- **Tag Executed:** \`${{ github.event.inputs.test_tag }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- **Allure Report Link:** [View Live Report](${{ steps.deployment.outputs.page_url }}${{ github.event.inputs.environment }}/)" >> $GITHUB_STEP_SUMMARY

    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report
