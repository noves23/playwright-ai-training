name: Playwright Manual Run

on:
  workflow_dispatch:
    inputs:
      test_tag:
        description: Select test tag to run
        required: true
        default: all
        type: choice
        options:
          - all
          - smoke
          - regression
          - mobile

      environment:
        description: Test environment
        required: true
        type: choice
        options:
          - integration
          - abnahme

permissions:
  contents: write

jobs:
  run-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Install Allure CLI
        run: npm install -g allure-commandline@2.34.1

      - name: Run Playwright tests
        env:
          TAG: ${{ github.event.inputs.test_tag }}
          ENVIRONMENT: ${{ github.event.inputs.environment }}
        run: |
          if [ "$TAG" = "all" ]; then
            npx playwright test --project="$ENVIRONMENT"
          else
            npx playwright test --project="$ENVIRONMENT" --grep "@$TAG"
          fi

      # Checkout existing gh-pages content
      - name: Checkout gh-pages branch
        if: always()
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      # Restore history for selected environment
      - name: Restore Allure history
        if: always()
        continue-on-error: true
        run: |
          mkdir -p allure-results/history

          cp -r \
            gh-pages/${{ github.event.inputs.environment }}/allure/history/* \
            allure-results/history/ || true

      - name: Generate Allure report
        if: always()
        run: |
          allure generate allure-results --clean -o allure-report

      - name: Prepare GitHub Pages structure
        if: always()
        run: |
          mkdir -p pages

          cp -r allure-report pages/allure
          cp -r playwright-report pages/playwright

      - name: Deploy reports to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pages
          destination_dir: ${{ github.event.inputs.environment }}
          keep_files: true

      - name: Upload Playwright report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.event.inputs.environment }}
          path: playwright-report
          retention-days: 3

      - name: Publish summary
        if: always()
        run: |
          echo "## Test execution completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ github.event.inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | ${{ github.event.inputs.test_tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Allure Report | https://noves23.github.io/playwright-ai-training/${{ github.event.inputs.environment }}/allure/ |" >> $GITHUB_STEP_SUMMARY
          echo "| Playwright Report | https://noves23.github.io/playwright-ai-training/${{ github.event.inputs.environment }}/playwright/ |" >> $GITHUB_STEP_SUMMARY